<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Research Study - Site A</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 450px; 
        }

        h1 { color: #252e39; margin-bottom: 20px; }
        
        .form-button { 
            display: inline-block;
            background-color: #8e44ad; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
            margin-top: 10px;
        }

        .form-button:hover { transform: scale(1.05); background-color: #732d91; }

        /* MODAL OVERLAY */
        #cookie-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #cookie-banner { 
            background: #252e39; 
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px;
            width: 85%;
        }

        .banner-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 30px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            border: none;
            transition: opacity 0.2s;
        }

        #accept-btn { background: #8e44ad; color: white; }
        #reject-btn { background: #5a6268; color: white; }

        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Computer Networks Project Site A</h1>
        <p>Thank you for participating in our academic study.</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScdsu7F7Fv0qF-Dnu9o8Y7F4IOHIZcUgb7vNEu5vzM8IAnrrA/viewform?usp=header" class="form-button">
            Start Experiment & Survey
        </a>
    </div>

    <div id="cookie-overlay">
        <div id="cookie-banner">
            <h2>Cookie Consent</h2>
            <p>This site uses cookies for our academic privacy study. Do you agree to the storage of cookies on your device?</p>
            <div class="banner-buttons">
                <button id="accept-btn" class="btn">Accept</button>
                <button id="reject-btn" class="btn">Decline</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('cookie-overlay');
        const acceptBtn = document.getElementById('accept-btn');
        const rejectBtn = document.getElementById('reject-btn');

        // Logic to show banner
        if (!localStorage.getItem('study_consent_given')) {
            overlay.style.display = 'flex';
        }

        acceptBtn.onclick = function() {
            document.cookie = "ExperimentID=SiteA_Accepted; path=/; SameSite=Lax; Secure";
            localStorage.setItem('study_consent_given', 'accepted');
            overlay.style.display = 'none';
        };

        rejectBtn.onclick = function() {
            localStorage.setItem('study_consent_given', 'rejected');
            overlay.style.display = 'none';
        };
    </script>
</body>
</html>
